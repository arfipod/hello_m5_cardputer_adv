[env:cardputer_adv_lvgl_demo]
extends = env:cardputer_adv
build_flags =
    ${common.base_build_flags}
    -DAPP_ENABLE_WIFI=0
    -DAPP_ENABLE_BLE=0
    -DAPP_ENABLE_LVGL=1
    -DAPP_ENABLE_USB=0
    -DAPP_MODE_LVGL_DEMO=1

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
    -std=c++17
    -DAPP_HOST_TEST=1
    -Ilib/common/include
