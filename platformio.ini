[platformio]
default_envs = cardputer_adv

[common]
platform = espressif32@6.12.0
monitor_speed = 115200
upload_speed = 921600
base_build_flags =
    -std=gnu++17
    -DAPP_TARGET_CARDPUTER_ADV=1
    -DAPP_ENABLE_DISPLAY=1
    -DAPP_ENABLE_KEYBOARD=1
    -DAPP_ENABLE_AUDIO=1
    -DAPP_ENABLE_IMU=1
    -DAPP_ENABLE_SD=1
    -DAPP_ENABLE_BATTERY=1
    -DAPP_ENABLE_IR=1
    -DAPP_SMOKE_SD_WRITE=0
optional_disabled_flags =
    -DAPP_ENABLE_WIFI=0
    -DAPP_ENABLE_BLE=0
    -DAPP_ENABLE_LVGL=0
    -DAPP_ENABLE_USB=0
default_build_flags =
    ${common.base_build_flags}
    ${common.optional_disabled_flags}
    -DAPP_MODE_BOOT_INFO=1

[env:cardputer_adv]
platform = ${common.platform}
framework = espidf
board = m5stack-stamps3
upload_protocol = esptool
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags = ${common.default_build_flags}

[env:cardputer_adv_devkit_fallback]
platform = ${common.platform}
framework = espidf
board = esp32-s3-devkitc-1
upload_protocol = esptool
monitor_speed = ${common.monitor_speed}
upload_speed = ${common.upload_speed}
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags =
    ${common.default_build_flags}
    -DAPP_BOARD_FALLBACK=1

[env:cardputer_adv_lvgl]
extends = env:cardputer_adv
build_flags =
    ${common.base_build_flags}
    -DAPP_ENABLE_WIFI=0
    -DAPP_ENABLE_BLE=0
    -DAPP_ENABLE_LVGL=1
    -DAPP_ENABLE_USB=0
    -DAPP_MODE_BOOT_INFO=1

[env:cardputer_adv_usb]
extends = env:cardputer_adv
build_flags =
    ${common.base_build_flags}
    -DAPP_ENABLE_WIFI=0
    -DAPP_ENABLE_BLE=0
    -DAPP_ENABLE_LVGL=0
    -DAPP_ENABLE_USB=1
    -DAPP_MODE_BOOT_INFO=1

[env:cardputer_adv_wifi_test]
extends = env:cardputer_adv
build_flags =
    ${common.base_build_flags}
    -DAPP_ENABLE_WIFI=1
    -DAPP_ENABLE_BLE=0
    -DAPP_ENABLE_LVGL=0
    -DAPP_ENABLE_USB=0
    -DAPP_MODE_WIFI_TEST=1

[env:cardputer_adv_i2c_scan]
extends = env:cardputer_adv
build_flags =
    ${common.base_build_flags}
    ${common.optional_disabled_flags}
    -DAPP_MODE_I2C_SCAN=1

[env:cardputer_adv_keyboard_test]
